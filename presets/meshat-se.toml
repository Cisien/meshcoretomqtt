# Preset for the Swedish broker on Meshat.se

[[broker]]
name = "Meshat.se"
enabled = true
server = "meshcore-mqtt.meshat.se"
port = 443
transport = "websockets"
keepalive = 60
qos = 0
retain = true

[broker.tls]
enabled = true
verify = true

[broker.auth]
method = "token"
audience = "meshcore-mqtt.meshat.se"
